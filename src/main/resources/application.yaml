spring:
  application:
    name: tightening
  profiles:
    active: dev  # 默认开发模式

  # SQLite数据库配置
  datasource:
    url: jdbc:sqlite:${user.home}/tightening_system/tightening.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10
      # SQLite专属优化
      #    journal_mode: WAL          # 写入性能提升3-5倍
      #    synchronous: NORMAL        # 平衡性能与安全
      #    cache_size: 1000           # 4MB缓存
      #    temp_store: MEMORY         # 临时表存内存
      #    busy_timeout: 5000         # 5秒忙等待（解决锁库问题）
      connection-init-sql: |
        PRAGMA journal_mode=WAL;
        PRAGMA synchronous=NORMAL;
        PRAGMA cache_size=1000;
        PRAGMA temp_store=MEMORY;
        PRAGMA busy_timeout=5000;
  # flyway
  flyway:
    enabled: true                       # 默认 true
    baseline-on-migrate: true           # 对于已有数据库的项目，首次运行会创建 flyway_schema_history 表
    locations: classpath:db/migration   # 默认路径，可以修改或增加
  # Web配置
  web:
    resources:
      add-mappings: false
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # 任务调度
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100

# 服务器配置
server:
  port: 8080
  tomcat:
    threads:
      max: 50
      min-spare: 10
    connection-timeout: 5000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 驼峰转换：device_id → deviceId
    cache-enabled: false                # 禁用缓存（SQLite 不需要）
    jdbc-type-for-null: 'NULL'          # 避免 SQLite NULL 问题
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      id-type: auto                     # 主键自增（对应 SQLite AUTOINCREMENT）
      table-underline: true             # 表名下划线命名
      logic-delete-field: deleted       # 逻辑删除字段名（可选）
      logic-not-delete-value: 0         # 未删除值
      logic-delete-value: 1             # 已删除值

# 本地设置（可通过 ${user.home}/tightening_system/settings.yml 覆盖）
tightening:
  self-loop-enabled: false
  export-types:
    - standard_excel
    - txt

# 日志配置
logging:
  level:
    root: INFO
    com.tightening: DEBUG
    io.netty: WARN
    org.apache.plc4x: WARN
    com.tightening.mapper: DEBUG  # 显示 SQL 语句

# 设备连接配置
device-config:
  reconnect-interval-ms: 3000
  connect-thread:
    core-pool-size: 5
    max-pool-size: 10
    keep-alive-time-ms: 30000
    capacity: 50
    termination-await-ms: 30000
  scan-thread:
    init-delay-ms: 0
    delay-ms: 5000
    termination-await-ms: 5000

# 工具控制配置
tool-control:
  common:
    lock_unlock_cooldown_ms: 5000
    cmd_timeout_ms: 5000
  fit:
    heart-beat-interval-ms: 30000
    heart-beat-retry-max: 3
    reassembly-timeout-ms: 10000
    heart-beat-timeout-ms: 5000

