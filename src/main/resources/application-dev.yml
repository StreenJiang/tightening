device-config:
  reconnect-interval-ms: 3000
  connect-thread:
    core-pool-size: 5
    max-pool-size: 10
    keep-alive-time-ms: 30000
    capacity: 50
    termination-await-ms: 30000
  scan-thread:
    init-delay-ms: 0
    delay-ms: 5000
    termination-await-ms: 5000

tool-control:
  common:
    lock_unlock_cooldown_ms: 5000
    cmd_timeout_ms: 5000
  fit:
    heart-beat-interval-ms: 30000
    heart-beat-retry-max: 3
    reassembly-timeout-ms: 10000
    heart-beat-timeout-ms: 5000
  gateway:
    poll-interval-ms: 100
    arm-read-timeout-ms: 3000
    setter-reset-retry-max: 10
    setter-retry-delay-ms: 100
